<!-- tasks_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="container">
        <h1>Task List</h1>
        <table id="tasks-table">
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Description</th>
                    <th>Assignee</th>
                    <th>Status</th>
                    <th>Deadline</th>
                </tr>
            </thead>
            <tbody id="tasks-list">
                <!-- Task rows will be populated here -->
            </tbody>
        </table>
    </div>

    <script src="scripts/tasks_list.js"></script>
</body>
</html>
